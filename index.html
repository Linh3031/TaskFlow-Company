<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaskFlow</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#ffffff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="brand-logo"><span class="material-icons-round">rocket_launch</span></div>
            <h2>Xin chào!</h2>
            <p>Hệ thống TaskFlow Online</p>
            <form id="login-form">
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">person</span>
                    <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">lock</span>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-grad">VÀO CA</button>
                <p class="error-msg" id="login-error"></p>
            </form>
        </div>
    </div>

    <div id="main-app" class="screen hidden">
        <header class="app-header">
            <div class="header-left">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-details">
                    <span class="user-name" id="display-username">User</span>
                    <span id="sync-status" style="font-size: 10px; color: #4caf50; display:flex; align-items:center; gap:3px;">● Online</span>
                </div>
            </div>
            
            <div style="display: flex; gap: 5px; align-items: center;">
                <button id="admin-btn" class="btn-icon hidden"><span class="material-icons-round" style="color: #ff9800;">settings</span></button>
                <button id="logout-btn" class="btn-icon"><span class="material-icons-round">logout</span></button>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="warehouse" style="--theme-color: #ff9800;">
                <div class="icon-box"><span class="material-icons-round">inventory_2</span></div><small>Kho</small>
            </button>
            <button class="tab-btn" data-tab="cashier" style="--theme-color: #4caf50;">
                <div class="icon-box"><span class="material-icons-round">point_of_sale</span></div><small>Thu Ngân</small>
            </button>
            <button class="tab-btn" data-tab="handover" style="--theme-color: #673ab7;">
                <div class="icon-box"><span class="material-icons-round">campaign</span></div><small>Bàn Giao</small>
            </button>
        </nav>

        <main class="content-area">
            <div id="tab-warehouse" class="tab-content active">
                <div class="section-header warehouse-theme"><h3>📦 Kho</h3><span class="task-count" id="count-warehouse">...</span></div>
                <div class="task-list" id="list-warehouse"></div>
            </div>

            <div id="tab-cashier" class="tab-content">
                <div class="section-header cashier-theme"><h3>💰 Thu Ngân</h3><span class="task-count" id="count-cashier">...</span></div>
                <div class="task-list" id="list-cashier"></div>
            </div>

            <div id="tab-handover" class="tab-content">
                <div class="section-header handover-theme"><h3>📢 Bàn Giao</h3><span class="task-count" id="count-handover">...</span></div>
                <div class="input-card">
                    <input type="datetime-local" id="new-handover-deadline">
                    <input type="text" id="new-handover-task" placeholder="Nội dung..." autocomplete="off">
                    <button id="btn-add-handover" class="btn-circle"><span class="material-icons-round">send</span></button>
                </div>
                <div class="task-list" id="list-handover"></div>
            </div>
        </main>

        <footer>Design by 3031</footer>
    </div>

    <div id="modal-complete" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-icon"><span class="material-icons-round">check_circle</span></div>
            <h3>Hoàn thành?</h3>
            <p id="modal-task-title" style="font-weight:bold; color:#333;">Task</p>
            <div class="note-area"><textarea id="task-note-input" rows="2" placeholder="Ghi chú..."></textarea></div>
            <div class="modal-actions"><button id="btn-cancel-modal" class="btn-secondary">Hủy</button><button id="btn-confirm-modal" class="btn-primary">Xong</button></div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay hidden">
        <div class="modal-box" style="text-align: left;">
            <h3 style="margin-bottom:15px">⚙️ Admin Setup</h3>
            <div style="margin-bottom:15px; border-bottom:1px solid #eee; padding-bottom:15px;">
                <button onclick="document.getElementById('excel-input').click()" class="btn-secondary" style="width:100%">📂 Nạp Excel Nhân viên</button>
                <input type="file" id="excel-input" hidden accept=".xlsx, .xls" />
            </div>
            <div>
                <div style="display:flex; gap:5px; margin-bottom:5px;">
                    <select id="admin-list-select" style="width:100%; padding:8px;"><option value="warehouse">Kho</option><option value="cashier">Thu Ngân</option></select>
                </div>
                <div class="input-card" style="padding:5px; background:#f9f9f9;">
                    <input type="text" id="admin-new-time" placeholder="08:00" style="width:60px; text-align:center;">
                    <input type="text" id="admin-new-task" placeholder="Tên việc..." style="flex:1">
                    <button id="admin-add-task-btn" class="btn-circle" style="background:#ff9800; width:35px; height:35px;">+</button>
                </div>
                <ul id="admin-task-list" style="height:150px; overflow-y:auto; border:1px solid #eee; list-style:none; padding:0;"></ul>
            </div>
            <button id="btn-close-settings" class="btn-secondary" style="width:100%; margin-top:10px; background:#333; color:white;">Đóng</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
