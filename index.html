<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskFlow - Quản Lý Công Việc</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div id="login-screen" class="screen">
        <div class="login-card">
            <div class="brand-logo"><span class="material-icons-round">rocket_launch</span></div>
            <h2>Xin chào!</h2>
            <p>Đăng nhập hệ thống Online</p>
            <form id="login-form">
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">person</span>
                    <input type="text" id="username" placeholder="Tên đăng nhập" required autocomplete="off">
                </div>
                <div class="input-wrapper">
                    <span class="material-icons-round input-icon">lock</span>
                    <input type="password" id="password" placeholder="Mật khẩu" required>
                </div>
                <button type="submit" class="btn-grad">VÀO CA LÀM VIỆC</button>
                <p class="error-msg" id="login-error"></p>
            </form>
        </div>
    </div>

    <div id="main-app" class="screen hidden">
        <header class="app-header">
            <div class="header-left">
                <div class="user-avatar" id="user-avatar">U</div>
                <div class="user-details"><span class="role-badge" id="user-role">Staff</span><span class="user-name" id="display-username">User</span></div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
                <div id="sync-status" style="font-size: 10px; color: #4caf50; font-weight: bold; display:flex; align-items:center;">● Online</div>
                <button id="admin-btn" class="btn-icon hidden" title="Admin"><span class="material-icons-round" style="color: #ff9800;">settings</span></button>
                <button id="logout-btn" class="btn-icon"><span class="material-icons-round">logout</span></button>
            </div>
        </header>

        <nav class="tab-nav">
            <button class="tab-btn active" data-tab="warehouse" style="--theme-color: #ff9800;"><div class="icon-box"><span class="material-icons-round">inventory_2</span></div><small>Kho</small></button>
            <button class="tab-btn" data-tab="cashier" style="--theme-color: #4caf50;"><div class="icon-box"><span class="material-icons-round">point_of_sale</span></div><small>Thu Ngân</small></button>
            <button class="tab-btn" data-tab="handover" style="--theme-color: #673ab7;"><div class="icon-box"><span class="material-icons-round">campaign</span></div><small>Bàn Giao</small></button>
        </nav>

        <main class="content-area">
            <div id="tab-warehouse" class="tab-content active">
                <div class="section-header warehouse-theme"><h3>📦 Checklist Kho</h3><span class="task-count" id="count-warehouse">Loading...</span></div>
                <div class="task-list" id="list-warehouse"></div>
            </div>
            <div id="tab-cashier" class="tab-content">
                <div class="section-header cashier-theme"><h3>💰 Checklist Thu Ngân</h3><span class="task-count" id="count-cashier">Loading...</span></div>
                <div class="task-list" id="list-cashier"></div>
            </div>
            <div id="tab-handover" class="tab-content">
                <div class="section-header handover-theme"><h3>📢 Bàn Giao Ca</h3><span class="task-count" id="count-handover">Loading...</span></div>
                
                <div class="input-card">
                    <input type="datetime-local" id="new-handover-deadline" title="Hạn chót hoàn thành">
                    <input type="text" id="new-handover-task" placeholder="Nội dung bàn giao..." autocomplete="off">
                    <button id="btn-add-handover" class="btn-circle"><span class="material-icons-round">send</span></button>
                </div>

                <div class="task-list" id="list-handover"></div>
            </div>
        </main>
        <footer style="text-align: center; padding: 5px; color: #ccc; font-size: 0.7rem; background: var(--bg-body);">Design by 3031</footer>
    </div>

    <div id="modal-complete" class="modal-overlay hidden">
        <div class="modal-box">
            <div class="modal-icon"><span class="material-icons-round">check_circle</span></div>
            <h3>Xác nhận hoàn thành</h3>
            <p id="modal-task-title">...</p>
            <div class="note-area"><textarea id="task-note-input" rows="2" placeholder="Ghi chú..."></textarea></div>
            <div class="modal-actions"><button id="btn-cancel-modal" class="btn-secondary">Hủy</button><button id="btn-confirm-modal" class="btn-primary">Hoàn Tất</button></div>
        </div>
    </div>

    <div id="modal-settings" class="modal-overlay hidden">
        <div class="modal-box" style="text-align: left; max-width: 450px;">
            <h3 style="margin-bottom: 15px; display:flex; align-items:center; gap:10px;"><span class="material-icons-round" style="color:#ff9800">settings</span> Admin (Cloud)</h3>
            <div style="margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #eee;">
                <h4 style="margin-bottom: 10px;">1. Nhân viên</h4>
                <button onclick="document.getElementById('excel-input').click()" class="btn-secondary" style="width:100%;"><span class="material-icons-round">cloud_upload</span> Nạp Excel</button>
                <input type="file" id="excel-input" hidden accept=".xlsx, .xls" />
            </div>
            <div style="margin-bottom: 20px;">
                <h4 style="margin-bottom: 10px;">2. Mẫu Checklist theo giờ</h4>
                <div style="display:flex; gap:5px; margin-bottom:10px;">
                    <select id="admin-list-select" style="width:100%; padding:8px; border:1px solid #ddd;"><option value="warehouse">Kho</option><option value="cashier">Thu Ngân</option></select>
                </div>
                <div class="input-card" style="margin-bottom:10px; padding: 5px; display:flex; gap:5px; background: #f9f9f9;">
                    <input type="text" id="admin-new-time" placeholder="Giờ (08:00)" style="width: 90px; text-align:center;">
                    <input type="text" id="admin-new-task" placeholder="Tên công việc..." style="flex:1;">
                    <button id="admin-add-task-btn" class="btn-circle" style="background:#ff9800;"><span class="material-icons-round">add</span></button>
                </div>
                <ul id="admin-task-list" style="max-height: 200px; overflow-y: auto; list-style: none; border: 1px solid #eee; padding: 0;"></ul>
            </div>
            <div class="modal-actions"><button id="btn-close-settings" class="btn-secondary" style="background:#333; color:white;">Đóng</button></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
